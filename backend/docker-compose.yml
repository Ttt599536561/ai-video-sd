services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_video
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_video
      JWT_SECRET: change-me
      REDEMPTION_HASH_SECRET: change-me-too
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    command: ["npm", "start"]

volumes:
  postgres_data:
