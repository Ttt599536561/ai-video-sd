# Copy to /etc/nginx/sites-available/ai-video and replace server_name values.
# If backend PORT is changed from 4000 to avoid another project, update every
# proxy_pass target below to the same port.
# Certbot can later extend this server block for HTTPS:
#   sudo certbot --nginx -d example.com -d www.example.com

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    root /var/www/ai-video;
    index auth.html;

    client_max_body_size 100m;

    access_log /var/log/nginx/ai-video.access.log;
    error_log /var/log/nginx/ai-video.error.log;

    location = /health {
        proxy_pass http://127.0.0.1:4000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /auth.html;
    }
}
